<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<style>
    .gradient-green{
background: linear-gradient(90deg,#1ee4b7 0%,#9cff00 100%);
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
}
.login-btn{
    display:flex;
    align-items:center;
    gap:10px;

    background:linear-gradient(90deg,#1ee4b7,#9cff00);
    color:#05070d;

    padding:12px 24px;
    border-radius:12px;

    text-decoration:none;
    font-weight:700;

    transition:.3s;
}

.login-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 0 20px rgba(156,255,0,.35);
}

</style>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <a href="index.html"><img src="logo.png" alt="Fitborypro" class="logo-img"></a>
            </div>
            <nav class="nav">
                <a href="sobre.html" class="nav-link">Sobre</a>
                <a href="planos.html" class="nav-link">Planos</a>
                <a href="contato.html" class="nav-link">Contato</a>
                <a href="https://gerenciaralunos.vercel.app/login" class="login-btn">
                    👤 Entrar
                </a>          
                
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <div class="hero-content">
                <h1 class="hero-title gradient-green">Fitborypro</h1>
                <p class="hero-subtitle">Transforme sua carreira como Personal Trainer</p>
                <p class="hero-subtitle-2">A solução completa para gerenciar seus alunos</p>
                <div style="display: flex; gap: 20px; justify-content: center; flex-wrap: wrap;">
                    <a href="planos.html" class="btn-primary">Ver Planos</a>
                    <a href="quem-usa.html" class="btn-secondary" style="background: white; color: #1a1a2e;">Sobre</a>
                </div>
            </div>
        </div>
    </section>

    <footer id="contato" class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">
                    <a href="index.html"><img src="logo.png" alt="Fitborypro" class="footer-logo-img"></a>
                </div>
                <p class="footer-text">Transforme sua carreira com Fitborypro</p>
                <div class="social-links">
                    <a href="#" class="social-link">Instagram</a>
                    <a href="#" class="social-link">Facebook</a>
                    <a href="#" class="social-link">WhatsApp</a>
                </div>
            </div>

        </div>
    </footer>
